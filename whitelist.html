<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Hollywood Roleplay</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <a href="#home" class="navbar-logo">
                <img src="./images/logo.png" alt="Hollywood RP">
            </a>
            <ul class="navbar-menu">
                <li><a href="./index.html#home">Kezdőlap</a></li>
                <li><a href="./index.html#info">Rólunk</a></li>
                <li><a href="./whitelist.html">Whitelist</a></li>
                <li><a href="./premium.html">Prémium Katalógus</a></li>
            </ul>
            <div class="navbar-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section id="whitelist" class="whitelist-section">
        <h2>Whitelist</h2>
        <span>Töltsd ki az alábbi whitelistet, hogy csatlakozhass a szerverhez!</span>
    
        <div id="login-container">
            <button id="login-btn">Bejelentkezés Discorddal</button>
        </div>
    
        <form class="whitelist-form" style="display: none;">
            <label for="name">Hogyan hívhatunk?</label>
            <div class="input-line"><input type="text" id="name" name="name" required></div>
    
            <label for="discord_name">Discord neved:</label>
            <div class="input-line"><input type="text" id="discord_name" name="discord_name" readonly required></div>
    
            <label for="steam-name">Steam neved:</label>
            <div class="input-line"><input type="text" id="steam_name" name="steam_name" required></div>
    
            <label for="age">Hány éves vagy?</label>
            <div class="input-line"><input type="number" id="age" name="age" required></div>
    
            <label for="reason">Miért szeretnél itt játszani?</label>
            <div class="input-line"><input type="text" id="reason" name="reason" required></div>
    
            <label for="source">Hol találtál ránk?</label>
            <div class="input-line"><input type="text" id="source" name="source" required></div>
    
            <label for="character_story">Írj egy karakter történetet (min. 500 szó)</label>
            <div class="input-line"><textarea id="character_story" name="character_story" required></textarea></div>
    
            <button type="submit" class="btn-join">Beküldés</button>
        </form>
    </section>
    
    
    <footer class="footer">
        <p>&copy; 2025 Hollywood Roleplay. Minden jog fenntartva.</p>
    </footer>
    
    <script src="script.js"></script>
    <script src="whitelist.js"></script>
    <script>
        document.getElementById("login-btn").addEventListener("click", () => {
            window.location.href = "https://bot.hollywoodrp.hu:32036/login";
        });
    
        async function checkLogin() {
            const response = await fetch("https://bot.hollywoodrp.hu:32036/user");
            const user = await response.json();
    
            if (user.loggedIn) {
                document.getElementById("login-container").style.display = "none";
                document.querySelector(".whitelist-form").style.display = "block";
                document.getElementById("discord_name").value = user.username;
            }
        }
    
        checkLogin();
    </script>
</body>
</html>
